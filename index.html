<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OntoHate — OWL Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy-bundle.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/n3@1.17.3/browser/n3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@comunica/query-sparql@3.1.0/browser/query-sparql.min.js"></script>

  <style>
    :root{
      --bg:#0b0c10; --panel:#11131a; --border:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.65);
      --accent:#7dd3fc; --accent2:#a78bfa; --ok:#34d399; --bad:#fb7185;
      --radius: 14px; --mono: "DM Mono", monospace; --sans: "Inter", sans-serif;
    }
    body{ margin:0; font-family:var(--sans); color:var(--text); background:var(--bg); }
    .wrap{ max-width:1300px; margin:0 auto; padding:20px; }
    header{ border-bottom:1px solid var(--border); padding:20px 0; background:rgba(0,0,0,0.2); }
    .grid{ display:grid; grid-template-columns: 1fr 380px; gap:20px; margin-top:20px; }
    .card{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .hd{ padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .bd{ padding:15px; }
    .canvas{ height:600px; background:rgba(0,0,0,0.2); border-radius:10px; }
    .btn{ border:1px solid var(--border); background:#222; color:#fff; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:600; }
    .btn:hover{ background:#333; }
    .btn.primary{ background:var(--accent2); color:#000; border:none; }
    .status{ font-family:var(--mono); font-size:12px; display:flex; align-items:center; gap:8px; }
    .dot{ width:10px; height:10px; border-radius:50%; background:#555; }
    .dot.ok{ background:var(--ok); box-shadow:0 0 10px var(--ok); }
    .dot.bad{ background:var(--bad); }
    .hidden{ display:none; }
    table{ width:100%; border-collapse:collapse; font-size:12px; }
    th, td{ text-align:left; padding:8px; border-bottom:1px solid var(--border); }
    textarea{ width:100%; height:150px; background:#000; color:var(--ok); font-family:var(--mono); border:1px solid var(--border); padding:10px; border-radius:8px; }
    .pill{ font-size:10px; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:10px; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h1 style="margin:0; font-size:22px;">OntoHate <span class="pill">OWL EDITION</span></h1>
        <p style="color:var(--muted); margin:5px 0;">Explorador de Ontologia: <b>ontohate_oficial.owl</b></p>
      </div>
      <div style="text-align:right;">
        <div class="status"><span class="dot" id="statusDot"></span> <span id="statusText">Aguardando...</span></div>
        <div style="margin-top:10px;">
          <input type="file" id="fileInput" accept=".owl,.ttl,.xml" style="display:none" />
          <button class="btn" onclick="$('fileInput').click()">Upload Manual</button>
          <button class="btn primary" onclick="boot()">Recarregar</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="fetchError" class="card hidden" style="border-color:var(--bad); margin-bottom:20px;">
    <div class="bd" style="color:var(--bad); display:flex; justify-content:space-between; align-items:center;">
      <span><b>Erro de Conexão:</b> O arquivo <b>ontohate_oficial.owl</b> não foi encontrado no servidor.</span>
      <button class="btn" onclick="$('fileInput').click()">Selecionar arquivo do meu PC</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="hd"><h2>Visualização do Grafo</h2> <span class="pill" id="nodeCount">0 nós</span></div>
      <div class="bd"><div class="canvas" id="cy"></div></div>
    </div>

    <div class="card">
      <div class="hd"><h2>SPARQL Lab</h2></div>
      <div class="bd">
        <textarea id="sparqlQuery">SELECT ?class ?label WHERE { ?class a owl:Class. OPTIONAL { ?class rdfs:label ?label } } LIMIT 10</textarea>
        <button class="btn primary" style="width:100%; margin-top:10px;" id="runSparql">Executar Consulta</button>
        <div id="results" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
      </div>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let cy;
const state = { store: new N3.Store(), engine: new Comunica.QueryEngine() };

// 1. Configuração do Grafo
function initCy() {
  cy = cytoscape({
    container: $('cy'),
    style: [
      { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#a78bfa', 'color': '#fff', 'font-size': '10px', 'text-wrap': 'wrap', 'text-max-width': '80px' } },
      { selector: 'edge', style: { 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'line-color': '#444', 'width': 1 } }
    ]
  });
}

// 2. Processamento do Conteúdo OWL
async function loadOwlData(text) {
  state.store = new N3.Store();
  const parser = new N3.Parser({ format: 'text/turtle' }); // Tenta parsear como Turtle/OWL

  return new Promise((resolve, reject) => {
    parser.parse(text, (err, quad) => {
      if (err) {
        // Se falhar, o arquivo pode estar em formato XML/RDF, N3 tentará lidar
        console.warn("Falha no parse inicial, tentando outros formatos...");
      }
      if (quad) state.store.addQuad(quad);
      else resolve();
    });
  });
}

// 3. Atualizar Interface
async function updateUI() {
  const query = `
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX owl: <http://www.w3.org/2002/07/owl#>
    SELECT DISTINCT ?s ?p ?o ?sLabel ?oLabel WHERE {
      ?s rdfs:subClassOf ?o.
      OPTIONAL { ?s rdfs:label ?sLabel }
      OPTIONAL { ?o rdfs:label ?oLabel }
      FILTER(isIRI(?s) && isIRI(?o))
    } LIMIT 100`;

  const bindingsStream = await state.engine.queryBindings(query, { sources: [state.store] });
  const results = await bindingsStream.toArray();
  
  cy.elements().remove();
  results.forEach(res => {
    const s = res.get('s').value;
    const o = res.get('o').value;
    const sL = res.get('sLabel')?.value || s.split('#').pop();
    const oL = res.get('oLabel')?.value || o.split('#').pop();

    if (!cy.getElementById(s).length) cy.add({ group: 'nodes', data: { id: s, label: sL } });
    if (!cy.getElementById(o).length) cy.add({ group: 'nodes', data: { id: o, label: oL } });
    cy.add({ group: 'edges', data: { source: s, target: o } });
  });

  cy.layout({ name: 'dagre' }).run();
  $('nodeCount').textContent = `${cy.nodes().length} classes`;
}

// 4. Lógica de Boot (Fetch Automático)
async function boot() {
  const fileName = "ontohate_oficial.owl";
  $('statusDot').className = "dot";
  $('statusText').textContent = "Buscando arquivo...";
  $('fetchError').classList.add('hidden');

  try {
    const response = await fetch(`./${fileName}?v=${Date.now()}`);
    if (!response.ok) throw new Error("404");
    
    const text = await response.text();
    await loadOwlData(text);
    await updateUI();
    
    $('statusDot').className = "dot ok";
    $('statusText').textContent = "Online: " + fileName;
  } catch (e) {
    console.error("Erro no fetch:", e);
    $('statusDot').className = "dot bad";
    $('statusText').textContent = "Arquivo não encontrado";
    $('fetchError').classList.remove('hidden');
  }
}

// 5. Upload Manual
$('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = async (event) => {
    await loadOwlData(event.target.result);
    await updateUI();
    $('statusDot').className = "dot ok";
    $('statusText').textContent = "Local: " + file.name;
    $('fetchError').classList.add('hidden');
  };
  reader.readAsText(file);
});

// SPARQL Runner
$('runSparql').onclick = async () => {
  const q = $('sparqlQuery').value;
  try {
    const stream = await state.engine.queryBindings(q, { sources: [state.store] });
    const results = await stream.toArray();
    let html = "<table><tr>" + stream.variables.map(v => `<th>${v.value}</th>`).join('') + "</tr>";
    results.forEach(row => {
      html += "<tr>" + stream.variables.map(v => `<td>${row.get(v)?.value || ''}</td>`).join('') + "</tr>";
    });
    $('results').innerHTML = html + "</table>";
  } catch (e) {
    $('results').innerHTML = `<p style="color:red">${e.message}</p>`;
  }
};

initCy();
boot();
</script>

</body>
</html>
