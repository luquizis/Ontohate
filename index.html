<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OntoHate — Visualizador de Ontologia</title>

  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy-bundle.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/n3@1.17.3/browser/n3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@comunica/query-sparql@3.1.0/browser/query-sparql.min.js"></script>

  <style>
    :root{
      --bg:#0b0c10; --panel:#11131a; --text:rgba(255,255,255,.92);
      --accent:#7dd3fc; --border:rgba(255,255,255,.10);
      --ok:#34d399; --warn:#fbbf24; --bad:#fb7185;
      --mono: "DM Mono", monospace;
    }
    body{ margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); }
    .wrap{ max-width:1300px; margin:0 auto; padding:15px; }
    header{ border-bottom:1px solid var(--border); padding:10px 0; position: sticky; top:0; background: var(--bg); z-index:100; }
    .grid{ display: grid; grid-template-columns: 1fr 380px; gap:15px; }
    .card{ background: var(--panel); border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:15px; }
    .canvas{ height: 600px; background: rgba(0,0,0,0.2); border-radius:8px; border:1px solid var(--border); }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid var(--border); background: #222; color:#fff; cursor:pointer; font-weight:bold; }
    .btn:hover{ background: #333; }
    .status{ font-family: var(--mono); font-size:12px; display:flex; align-items:center; gap:8px; }
    .dot{ width:10px; height:10px; border-radius:50%; background: #666; }
    .dot.ok{ background: var(--ok); }
    .dot.warn{ background: var(--warn); }
    .dot.bad{ background: var(--bad); }
    .hidden{ display: none; }
    textarea{ width:100%; height:150px; background:#000; color:var(--ok); font-family:var(--mono); border:1px solid var(--border); border-radius:8px; }
    table{ width:100%; border-collapse: collapse; font-size:12px; }
    th, td{ border:1px solid var(--border); padding:8px; text-align:left; }
    .pill{ font-size:10px; background: rgba(255,255,255,0.1); padding:2px 6px; border-radius:10px; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h1 style="margin:0; font-size:20px;">OntoHate Explorer</h1>
        <div class="status">
          <div id="statusDot" class="dot"></div>
          <span id="statusText">Iniciando...</span>
        </div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn" id="reloadBtn">Recarregar TTL</button>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="card" id="debugCard">
    <div style="display:flex; justify-content:space-between;">
      <h3 style="margin:0 0 10px 0;">Debug de Conexão</h3>
      <span class="pill" id="loadSource">Nenhum</span>
    </div>
    <div id="debugContent" style="font-family:var(--mono); font-size:11px; color:#aaa;">
      Aguardando tentativa de conexão...
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div id="cy" class="canvas"></div>
    </div>

    <div class="card">
      <h3>Controles</h3>
      <p style="font-size:12px; color:#888;">Clique em um nó para isolar sua vizinhança (Foco).</p>
      
      <label style="font-size:12px;">Dimensão Principal:</label>
      <select id="dimSelect" style="width:100%; padding:8px; margin:10px 0;"></select>
      
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn" id="buildBtn" style="flex:1;">Gerar Grafo</button>
        <button class="btn" id="clearFocusBtn">Limpar Foco</button>
      </div>

      <div style="border-top:1px solid var(--border); padding-top:15px;">
        <h3>SPARQL Rápido</h3>
        <textarea id="sparqlQuery">SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 10</textarea>
        <button class="btn" id="runSparql" style="width:100%; margin-top:10px; background:var(--ok); color:#000;">Executar</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Resultados SPARQL</h3>
    <div id="sparqlResults" style="overflow-x:auto;"></div>
  </div>
</main>

<script>
// --- CONFIGURAÇÃO ---
const USER = "luquizis";
const REPO = "Ontohate";
const FILE = "Ontohate_oficial.ttl";

const URLS = [
  `./${FILE}`, // Tenta localmente (GitHub Pages)
  `https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}` // Fallback RAW
];

const state = {
  store: new N3.Store(),
  engine: new Comunica.QueryEngine(),
  classes: new Set(),
  children: new Map(),
  labels: new Map()
};

const $ = id => document.getElementById(id);

// --- LOADER ROBUSTO ---
async function boot() {
  updateStatus("warn", "Tentando baixar arquivo...");
  let text = null;
  let successfulUrl = null;
  let log = "";

  for (const url of URLS) {
    log += `Testando: ${url} ... `;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (res.ok) {
        text = await res.text();
        successfulUrl = url;
        log += "✅ OK\n";
        break;
      } else {
        log += `❌ FALHA (${res.status})\n`;
      }
    } catch (e) {
      log += `❌ ERRO DE REDE/CORS\n`;
    }
  }

  $("debugContent").innerText = log;
  if (!text) {
    updateStatus("bad", "Erro: Não foi possível carregar o arquivo .ttl");
    return;
  }

  $("loadSource").innerText = successfulUrl.includes("raw") ? "GitHub RAW" : "GitHub Pages";
  updateStatus("warn", "Parseando Turtle...");

  try {
    const parser = new N3.Parser();
    state.store.addQuads(parser.parse(text));
    await indexOntology();
    updateStatus("ok", "Ontologia pronta!");
    populateSelect();
    initGraph();
  } catch (e) {
    console.error(e);
    updateStatus("bad", "Erro no processamento dos dados.");
  }
}

// --- INDEXAÇÃO ---
async function indexOntology() {
  const query = `
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX owl: <http://www.w3.org/2002/07/owl#>
    SELECT ?c ?label ?parent WHERE {
      ?c a owl:Class .
      OPTIONAL { ?c rdfs:label ?label }
      OPTIONAL { ?c rdfs:subClassOf ?parent . FILTER(isIRI(?parent)) }
    }
  `;
  const bindings = await state.engine.queryBindings(query, { sources: [state.store] });
  const results = await bindings.toArray();

  results.forEach(row => {
    const c = row.get('c').value;
    const label = row.get('label')?.value || c.split('#').pop();
    const parent = row.get('parent')?.value;

    state.classes.add(c);
    state.labels.set(c, label);
    if (parent) {
      if (!state.children.has(parent)) state.children.set(parent, new Set());
      state.children.get(parent).add(c);
    }
  });
}

// --- GRAFO (Cytoscape) ---
let cy;
function initGraph() {
  cy = cytoscape({
    container: $('cy'),
    style: [
      { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#7dd3fc', 'color': '#fff', 'font-size': '10px', 'text-wrap': 'wrap', 'text-max-width': '80px', 'text-valign': 'center' } },
      { selector: 'edge', style: { 'width': 2, 'line-color': '#444', 'target-arrow-shape': 'triangle', 'target-arrow-color': '#444', 'curve-style': 'bezier' } },
      { selector: '.faded', style: { 'opacity': 0.1 } },
      { selector: ':selected', style: { 'border-width': 3, 'border-color': '#fff' } }
    ]
  });

  cy.on('tap', 'node', function(evt){
    const node = evt.target;
    cy.elements().addClass('faded');
    node.closedNeighborhood().removeClass('faded');
  });

  $('clearFocusBtn').onclick = () => cy.elements().removeClass('faded');
}

function buildGraph() {
  const root = $('dimSelect').value;
  const elements = [];
  const processed = new Set();
  const queue = [root];

  while (queue.length > 0) {
    const curr = queue.shift();
    if (processed.has(curr)) continue;
    processed.add(curr);

    elements.push({ data: { id: curr, label: state.labels.get(curr) || curr } });

    const kids = state.children.get(curr);
    if (kids) {
      kids.forEach(k => {
        elements.push({ data: { source: curr, target: k } });
        queue.push(k);
      });
    }
  }

  cy.elements().remove();
  cy.add(elements);
  cy.layout({ name: 'dagre' }).run();
}

// --- SPARQL ---
async function runSparql() {
  const query = $('sparqlQuery').value;
  try {
    const bindings = await state.engine.queryBindings(query, { sources: [state.store] });
    const results = await bindings.toArray();
    const vars = bindings.variables.map(v => v.value);

    let html = "<table><tr>" + vars.map(v => `<th>${v}</th>`).join("") + "</tr>";
    results.forEach(row => {
      html += "<tr>" + vars.map(v => `<td>${row.get(v)?.value || ""}</td>`).join("") + "</tr>";
    });
    $('sparqlResults').innerHTML = html + "</table>";
  } catch (e) {
    alert("Erro na query: " + e.message);
  }
}

// --- HELPERS ---
function updateStatus(kind, text) {
  $('statusDot').className = `dot ${kind}`;
  $('statusText').innerText = text;
}

function populateSelect() {
  const sel = $('dimSelect');
  state.classes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.innerText = state.labels.get(c);
    sel.appendChild(opt);
  });
}

$('buildBtn').onclick = buildGraph;
$('runSparql').onclick = runSparql;
$('reloadBtn').onclick = () => location.reload();

boot();
</script>
</body>
</html>
